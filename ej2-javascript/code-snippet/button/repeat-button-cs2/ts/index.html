<!DOCTYPE html>
<html lang="en">

<head>
    <title>EJ2 Button</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Typescript UI Controls" />
    <meta name="author" content="Syncfusion" />
    <link href="https://cdn.syncfusion.com/ej2/20.3.56/ej2-base/styles/material.css" rel="stylesheet" />
    <link href="https://cdn.syncfusion.com/ej2/20.3.56/ej2-buttons/styles/material.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/systemjs/0.19.38/system.js"></script>
    <script src="systemjs.config.js"></script>
      <style>
        body {
            font-family: Roboto, sans-serif;
            padding: 20px;
        }

        button {
            margin: 10px 5px;
        }

        .frame {
            border: 1px solid #dddddd;
            border-radius: 3px;
            padding: 20px 30px;
            margin: 20px 0;
            max-width: 520px;
        }

        .frame h3 {
            margin-top: 0;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .controls label {
            display: flex;
            flex-direction: column;
            font-size: 13px;
            color: #555;
            gap: 4px;
        }

        .controls label.inline {
            flex-direction: row;
            align-items: center;
            gap: 8px;
        }

        .controls input[type="number"] {
            width: 80px;
            padding: 4px 6px;
            border: 1px solid #bbb;
            border-radius: 3px;
            font-size: 13px;
        }

        .counter-display {
            margin-top: 20px;
            display: flex;
            gap: 30px;
        }

        .counter-display .counter-box {
            border: 1px solid #dddddd;
            border-radius: 3px;
            padding: 10px 18px;
            text-align: center;
            min-width: 110px;
        }

        .counter-display .counter-box .label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .counter-display .counter-box .value {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        .counter-display .counter-box.repeat .value {
            color: #1565c0;
        }

        .reset-link {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div id='loader'>LOADING....</div>
   <div id="container">
    <div class="frame">
        <h3>Repeat Button</h3>
        <p style="font-size: 13px; color: #555; margin-top: 0;">
            Hold the button to fire continuous <code>clicked</code> events.
            The counters below track initial clicks vs. repeat fires.
        </p>

        <button id="repeat-btn">Hold Me</button>

        <div class="controls">
            <label>
                Repeat Delay (ms)
                <input type="number" id="delay-input" value="400" min="0" step="50" />
            </label>
            <label>
                Repeat Interval (ms)
                <input type="number" id="interval-input" value="100" min="0" step="50" />
            </label>
            <label class="inline">
                <input type="checkbox" id="disabled-toggle" />
                Disabled
            </label>
        </div>

        <div class="counter-display">
            <div class="counter-box">
                <div class="label">Initial Clicks</div>
                <div class="value" id="initial-count">0</div>
            </div>
            <div class="counter-box repeat">
                <div class="label">Repeat Clicks</div>
                <div class="value" id="repeat-count">0</div>
            </div>
        </div>

        <span class="reset-link" id="reset-btn">Reset counters</span>
    </div>

    </div>
</body>

</html>
