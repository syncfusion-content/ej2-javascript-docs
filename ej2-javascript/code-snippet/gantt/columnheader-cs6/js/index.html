<!DOCTYPE html>
<html lang="en">

<head>
    <title>EJ2 Gantt</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Typescript Gantt Controls">
    <meta name="author" content="Syncfusion">
    <link href="index.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/tailwind3.css" rel="stylesheet" type="text/css">
    <script src="https://cdn.syncfusion.com/ej2/32.1.19/dist/ej2.min.js" type="text/javascript"></script>
    <script src="es5-datasource.js" type="text/javascript"></script>
</head>

<body>
    <div>
        <label style="padding:10px 10px 26px 0">Select column name:</label>
        <input id="columnList" />
        <br /><br />

        <label style="padding:30px 17px 0 0">Enter new header text:</label>
        <input id="headerText" />
        <br /><br />

        <label style="padding:30px 17px 0 0">Click the change button:</label>
        <button id="changeHeader">Change</button>

        <div style="padding:40px 0 0 0">
            <div id="Gantt"></div>
        </div>
    </div>

    <script>
        var ele = document.getElementById('container');
        if (ele) {
            ele.style.visibility = "visible";
        }   
    </script>
    <script src="index.js" type="text/javascript"></script>
</body>

</html>
