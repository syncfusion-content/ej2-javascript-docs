<!DOCTYPE html>
<html lang="en">

<head>
    <title>EJ2 Gantt</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Typescript Gantt Controls">
    <meta name="author" content="Syncfusion">
    <link href="index.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/tailwind3.css" rel="stylesheet" type="text/css">
    <script src="https://cdn.syncfusion.com/ej2/32.1.19/dist/ej2.min.js" type="text/javascript"></script>
    <script src="es5-datasource.js" type="text/javascript"></script>
</head>

<body>
    <div id="container">
        <div style="display:flex; gap:15px; margin-bottom:20px;">
            <div>
                <label>Row Index:</label>
                <input id="rowIndex" />
                <button id="selectRow">Select Row</button>
            </div>

            <div>
                <label>Scroll to Date:</label>
                <input id="scrollDate" />
                <button id="scrollToDate">Scroll Date</button>
            </div>

            <div>
                <label>Scroll to Task ID:</label>
                <input id="taskId" />
                <button id="scrollTask">Scroll Task</button>
            </div>
        </div>

        <div id="Gantt" style="height:500px;"></div>
    </div>
    <script>
        var ele = document.getElementById('container');
        if (ele) {
            ele.style.visibility = "visible";
        }   
    </script>
    <script src="index.js" type="text/javascript"></script>
</body>

</html>
