<!DOCTYPE html>
<html lang="en">

<head>
    <title>EJ2 Gantt</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Typescript Gantt Controls">
    <meta name="author" content="Syncfusion">
    <link href="index.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/tailwind3.css" rel="stylesheet" type="text/css">
    <script src="https://cdn.syncfusion.com/ej2/32.1.19/dist/ej2.min.js" type="text/javascript"></script>
    <script src="es5-datasource.js" type="text/javascript"></script>
</head>

<body>
    <div id="container">
        <div id="controls">
            <button id="expandAll">Expand All</button>
            <button id="collapseAll">Collapse All</button>
            <button id="expandLevel0">Expand Level 0</button>
            <button id="collapseLevel1">Collapse Level 1</button>
            <button id="expandById">Expand Task ID 2</button>
            <button id="collapseById">Collapse Task ID 1</button>
            <button id="expandFirstRow">Expand First Row</button>
            <button id="collapseFirstRow">Collapse First Row</button>
        </div>
        <div id="Gantt"></div>
    </div>
    <script>
        var ele = document.getElementById('container');
        if (ele) {
            ele.style.visibility = "visible";
        }   
    </script>
    <script src="index.js" type="text/javascript"></script>
</body>

</html>
