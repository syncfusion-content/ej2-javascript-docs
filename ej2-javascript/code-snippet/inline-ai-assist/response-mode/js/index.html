
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
                
    <title>JavaScript (ES5) Inline AI Assist</title>
    <!-- JavaScript (ES5) Inline AI Assist's dependency style -->
    <link href="https://cdn.syncfusion.com/ej2/20.3.56/ej2-base/styles/material.css" rel="stylesheet" />

    <link href="https://cdn.syncfusion.com/ej2/20.3.56/ej2-notifications/styles/material.css" rel="stylesheet" />

    <!-- JavaScript (ES5) Inline AI Assist's control style -->
    <link href="https://cdn.syncfusion.com/ej2/20.3.56/ej2-interactive-chat/styles/material.css" rel="stylesheet" />

    <!-- JavaScript (ES5) Inline AI Assist's dependent scripts -->

  <body>
    <div id='loader'>Loading....</div>
    <div id="mode-selector">
        <label for="responseMode">Response mode:</label>
        <select id="responseMode">
            <option value="Popup" selected>Popup</option>
            <option value="Inline">Inline</option>
        </select>
    </div>
    <div id='container' style="height: 350px; width: 650px;">
        <div id="defaultInlineAssist"></div>
    </div>
